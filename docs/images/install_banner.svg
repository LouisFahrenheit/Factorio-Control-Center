<svg xmlns="http://www.w3.org/2000/svg" width="240" height="60" viewBox="0 0 240 60" role="img" aria-label="FCC Install and run">
  <defs>
    <clipPath id="left-cell-install">
      <rect width="60" height="60" rx="6"/>
    </clipPath>
  </defs>

  <!-- Button background -->
  <rect width="240" height="60" rx="6" fill="#282828"/>

  <!-- Left icon cell -->
  <rect width="60" height="60" fill="#1e1e1e" clip-path="url(#left-cell-install)"/>

  <!-- Divider -->
  <line x1="60.5" y1="0" x2="60.5" y2="60" stroke="#3e3e3e" stroke-width="1"/>

  <!-- Box and arrow icon, centered at (30, 30) -->
  <g transform="translate(30,30)" stroke="#e8a640" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Box top -->
    <polyline points="-8,-1 0,-5 8,-1 0,3 -8,-1" />
    <!-- Box sides -->
    <polyline points="-8,-1 -8,7 0,11 8,7 8,-1" />
    <!-- Center line -->
    <line x1="0" y1="3" x2="0" y2="11" />
    <!-- Arrow pointing down into the box -->
    <line x1="0" y1="-11" x2="0" y2="-4" />
    <polyline points="-3,-7 0,-4 3,-7" />
  </g>

  <!-- Title -->
  <text x="80" y="28" font-family="system-ui,-apple-system,'Segoe UI',Roboto,Arial,sans-serif" font-size="14" font-weight="700" fill="#cccccc">FCC</text>
  <!-- Subtitle -->
  <text x="80" y="44" font-family="system-ui,-apple-system,'Segoe UI',Roboto,Arial,sans-serif" font-size="12" fill="#888888">Install and run</text>

  <!-- Outer frame -->
  <rect x="0.75" y="0.75" width="238.5" height="58.5" rx="5.5" fill="none" stroke="#555555" stroke-width="1.5"/>
</svg>
