# Monorepo (DEV-Main): the active workflow is ../../.github/workflows/release.yml
# This copy applies only if this folder is the repository root.
name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json

      - name: Build release archives
        run: npm run pack:release

      - name: Resolve version
        id: version
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version: ${VERSION}"

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: Factorio Control Center v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            release/factorio-control-center-linux.tar.gz
            release/factorio-control-center-win.zip

      - name: Upload build artifacts (manual run)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v6
        with:
          name: factorio-control-center-v${{ steps.version.outputs.version }}
          path: |
            release/factorio-control-center-linux.tar.gz
            release/factorio-control-center-win.zip
          retention-days: 14
